version: '3.8'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  dna-postgres:
    image: postgres:16-alpine
    container_name: dna-postgres
    environment:
      POSTGRES_DB: dna
      POSTGRES_USER: dna_user
      POSTGRES_PASSWORD: dna_password_dev
      POSTGRES_INITDB_ARGS: "-E UTF8"
    # Port only exposed to host for local DB tools (DBeaver/psql). Safe to remove in production.
    ports:
      - "${PORT_POSTGRES:-3012}:5432"
    volumes:
      - dna-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - dna-network
      - portal-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dna_user -d dna"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Authentication Service
  # ============================================================
  dna-auth:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: dna-auth
    expose:
      - "${PORT_AUTH:-3011}"
    volumes:
      - ./auth_service:/app
    environment:
      # App config
      - APP_TITLE=DNA Auth Service
      - APP_DESCRIPTION=Authentication and authorization for DNA Dashboard
      - APP_VERSION=1.0.0
      - HOST=0.0.0.0
      - PORT=${PORT_AUTH:-3011}
      
      # Database
      - DATABASE_HOST=dna-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=dna
      - DATABASE_USER=dna_user
      - DATABASE_PASSWORD=dna_password_dev
      - DATABASE_SCHEMA=auth
      
      # Security
      - SECRET_KEY=${SECRET_KEY:-dna-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dna-jwt-secret-change-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      
      # CORS
      - CORS_ORIGINS=http://localhost:${PORT_FRONTEND:-3001},http://localhost:${PORT_BACKEND:-3010}
      
      # Logging
      - LOG_LEVEL=INFO
    
    networks:
      - dna-network
    depends_on:
      dna-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_AUTH:-3011}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================
  # Backend API Service
  # ============================================================
  dna-backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: dna-backend
    expose:
      - "${PORT_BACKEND:-3010}"
    volumes:
      - ./dashboard/backend:/app
      - ./ai-service/uploads:/app/uploads  # Shared uploads folder with AI service
      - ./storage/iso_pdfs:/app/storage/iso_pdfs  # Shared ISO PDF storage with AI service
      - backend-pip-cache:/home/dna/.cache/pip  # Cache pip packages
    environment:
      # App config
      - APP_ENV=development
      - APP_HOST=0.0.0.0
      - APP_PORT=${PORT_BACKEND:-3010}
      - APP_RELOAD=true
      
      # Database
      - DATABASE_HOST=dna-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=dna
      - DATABASE_USER=dna_user
      - DATABASE_PASSWORD=dna_password_dev
      - DATABASE_APP_SCHEMA=dna_app
      - DATABASE_AUTH_SCHEMA=auth
      - DATABASE_CUSTOMER_SCHEMA=customer
      
      # Auth service
      - AUTH_SERVICE_URL=http://dna-auth:${PORT_AUTH:-3011}
      - PORTAL_URL=${PORTAL_URL:-http://localhost:4000}
      
      # Redis
      - REDIS_HOST=dna-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      
      # AI Provider (mirrors ai-service — used by admin UI; keys live in DB only)
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-3}
      - MAX_COST_PER_TASK_USD=${MAX_COST_PER_TASK_USD:-5.00}
      
      # Security
      - SECRET_KEY=${SECRET_KEY:-dna-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost:${PORT_FRONTEND:-3001},http://localhost:${PORT_BACKEND:-3010},https://${CF_DNA_HOSTNAME:-dna.example.com}

      # Cloudflare Zero Trust
      - CF_BYPASS_LOCAL=${CF_BYPASS_LOCAL:-true}
      - CF_TEAM_DOMAIN=${CF_TEAM_DOMAIN:-}
      - CF_APP_AUD=${CF_APP_AUD:-}
      - CF_INTERNAL_SERVICE_TOKEN=${CF_INTERNAL_SERVICE_TOKEN:-}
      
      # Logging
      - LOG_LEVEL=INFO
    
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dna-network"
      - "traefik.http.routers.dna-api.rule=Host(`${CF_DNA_HOSTNAME:-dna.example.com}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/health`))"
      - "traefik.http.routers.dna-api.priority=20"
      - "traefik.http.services.dna-api.loadbalancer.server.port=${PORT_BACKEND:-3010}"
    networks:
      - dna-network
    depends_on:
      - dna-postgres
      - dna-auth
      - dna-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_BACKEND:-3010}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: >
      sh -c "
      if [ ! -f /app/.pip-checksum ] || [ $$(md5sum /app/requirements.txt 2>/dev/null | cut -d' ' -f1) != $$(cat /app/.pip-checksum 2>/dev/null) ]; then
        echo 'Requirements.txt changed - installing dependencies...';
        pip install --user -r /app/requirements.txt;
        md5sum /app/requirements.txt | cut -d' ' -f1 > /app/.pip-checksum;
        echo 'Dependencies installed!';
      else
        echo 'Dependencies up to date, skipping install';
      fi;
      python -m app.main
      "

  # ============================================================
  # Redis Service
  # ============================================================
  dna-redis:
    image: redis:7-alpine
    container_name: dna-redis
    # Redis not exposed to host in production
    expose:
      - "6379"
    volumes:
      - dna-redis-data:/data
    networks:
      - dna-network
      - portal-db-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # AI Service (Background Worker)
  # ============================================================
  dna-ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: dna-ai-service
    volumes:
      - ./ai-service:/app
      - ./ai-service/uploads:/app/uploads  # Shared uploads folder (bind mount)
      - ./storage/iso_pdfs:/app/storage/iso_pdfs  # Shared ISO PDF storage with backend
    environment:
      # Database
      - DATABASE_HOST=dna-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=dna
      - DATABASE_USER=dna_user
      - DATABASE_PASSWORD=dna_password_dev
      - DATABASE_APP_SCHEMA=dna_app
      - DATABASE_AUTH_SCHEMA=auth
      - DATABASE_CUSTOMER_SCHEMA=customer

      # Redis
      - REDIS_HOST=dna-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0

      # Encryption — must match dna-backend SECRET_KEY for DB credential decryption
      - SECRET_KEY=${SECRET_KEY:-dna-secret-dev-key-123456789-change-in-production}

      # LLM Provider Configuration — API keys live in DB (llm_providers table), not env vars
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      # Env-var fallbacks kept empty — remove to enforce DB-only
      - ANTHROPIC_API_KEY=
      - GOOGLE_API_KEY=
      - GROQ_API_KEY=
      - OPENAI_API_KEY=

      # Worker Configuration
      - WORKER_CONCURRENCY=3
      - LOG_LEVEL=INFO
      - ENABLE_COST_TRACKING=true
      - MAX_COST_PER_TASK_USD=5.00
      - UPLOAD_PATH=/app/uploads

      # Template Validation
      - ENABLE_TEMPLATE_SELF_HEALING=${ENABLE_TEMPLATE_SELF_HEALING:-true}

    networks:
      - dna-network
    depends_on:
      - dna-postgres
      - dna-redis
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python main.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # Automation Service (Email Collection Worker)
  # ============================================================
  dna-automation-service:
    build:
      context: ./automation-service
      dockerfile: Dockerfile
    container_name: dna-automation-service
    volumes:
      - ./automation-service:/app
      - ./dashboard/backend/storage:/app/storage/customers  # shared customer storage
    environment:
      # Database
      - DATABASE_HOST=dna-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=dna
      - DATABASE_USER=dna_user
      - DATABASE_PASSWORD=dna_password_dev
      - DATABASE_APP_SCHEMA=dna_app

      # Redis
      - REDIS_HOST=dna-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0

      # LLM models — keys live in DB only (dna_app.llm_providers)
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

      # Storage
      - CUSTOMER_STORAGE_PATH=/app/storage/customers

      # Encryption — must match dna-backend SECRET_KEY so credentials decrypt correctly
      - SECRET_KEY=${SECRET_KEY:-dna-secret-dev-key-123456789-change-in-production}

      # Customer portal link included in outbound emails
      - PORTAL_URL=${PORTAL_URL:-http://localhost:4000}

      # Attachment security — shares ClamAV with portal-backend
      - CLAMAV_HOST=portal-clamav
      - CLAMAV_PORT=3310
      - REQUIRE_AV_SCAN=${REQUIRE_AV_SCAN:-false}
      - MAX_ATTACHMENT_SIZE_MB=20

      - LOG_LEVEL=INFO

    networks:
      - dna-network
      - portal-network
    depends_on:
      - dna-postgres
      - dna-redis
      - portal-clamav
    restart: unless-stopped

  # ============================================================
  # Frontend Service
  # ============================================================
  dna-frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile.dev
    container_name: dna-frontend
    expose:
      - "3000"
    volumes:
      - ./dashboard/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:${PORT_BACKEND:-3010}}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${PORT_BACKEND:-3010}}
      - NEXT_PUBLIC_AUTH_URL=${NEXT_PUBLIC_AUTH_URL:-http://localhost:${PORT_AUTH:-3011}}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:${PORT_BACKEND:-3010}}
      # Cloudflare Zero Trust
      - NEXT_PUBLIC_CF_BYPASS=${CF_BYPASS_LOCAL:-true}
      - NEXT_PUBLIC_DEV_LOGIN_HELPER=${NEXT_PUBLIC_DEV_LOGIN_HELPER:-true}
      - NEXT_PUBLIC_CF_TEAM_DOMAIN=${CF_TEAM_DOMAIN:-}
      # Internal service token — used by server-side Next.js proxies to call the backend
      - CF_INTERNAL_SERVICE_TOKEN=${CF_INTERNAL_SERVICE_TOKEN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dna-network"
      # Catch-all: frontend handles everything not matched by higher-priority rules
      - "traefik.http.routers.dna-frontend.rule=Host(`${CF_DNA_HOSTNAME:-dna.example.com}`)"
      - "traefik.http.routers.dna-frontend.priority=1"
      - "traefik.http.routers.dna-frontend.service=dna-frontend"
      - "traefik.http.services.dna-frontend.loadbalancer.server.port=3000"
      # Next.js API routes that live on the frontend (higher priority than the backend /api rule)
      - "traefik.http.routers.dna-frontend-api.rule=Host(`${CF_DNA_HOSTNAME:-dna.example.com}`) && (PathPrefix(`/api/document-`) || PathPrefix(`/api/config/`))"
      - "traefik.http.routers.dna-frontend-api.priority=25"
      - "traefik.http.routers.dna-frontend-api.service=dna-frontend"
      - "traefik.http.services.dna-frontend.loadbalancer.server.port=3000"
    networks:
      - dna-network
    depends_on:
      - dna-backend
      - dna-auth
    restart: unless-stopped
    command: >
      sh -c "
      if [ ! -f /app/.npm-checksum ] || [ $$(md5sum /app/package.json | cut -d' ' -f1) != $$(cat /app/.npm-checksum) ]; then
        echo 'Package.json changed - installing dependencies...';
        npm install;
        md5sum /app/package.json | cut -d' ' -f1 > /app/.npm-checksum;
        echo 'Dependencies installed!';
      else
        echo 'Dependencies up to date, skipping install';
      fi;
      npm run dev
      "

  # ============================================================
  # Customer Portal — ClamAV
  # ============================================================
  portal-clamav:
    image: clamav/clamav:stable
    container_name: portal-clamav
    networks:
      - portal-network
    volumes:
      - clamav-db:/var/lib/clamav
      - portal-tmp:/tmp/uploads
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
    restart: unless-stopped

  # ============================================================
  # Customer Portal — Backend
  # ============================================================
  portal-backend:
    build:
      context: ./customer-portal/backend
      dockerfile: Dockerfile
    container_name: portal-backend
    expose:
      - "4010"
    volumes:
      - portal-tmp:/tmp/uploads
      - portal-storage:/app/storage
    environment:
      - DATABASE_URL=postgresql://portal_user:${PORTAL_DB_PASSWORD:-portal_pass_change_in_production}@dna-postgres:5432/dna
      - REDIS_URL=redis://dna-redis:6379/2
      - DATABASE_APP_SCHEMA=dna_app
      - PORTAL_TOKEN_MAX_AGE_DAYS=7
      - MAX_UPLOAD_SIZE_MB=20
      - STORAGE_PATH=/app/storage
      - REQUIRE_AV_SCAN=${REQUIRE_AV_SCAN:-true}
      - CLAMAV_HOST=portal-clamav
      - CLAMAV_PORT=3310
      - SECRET_KEY=${SECRET_KEY:-dna-secret-key-change-in-production}
      - MCP_URL=${MCP_URL:-http://customer_portal_mcp:8000}
      - MCP_ENABLED=${MCP_ENABLED:-true}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=portal-network"
      - "traefik.http.routers.portal-ws.rule=Host(`${CF_PORTAL_HOSTNAME:-portal.example.com}`) && PathPrefix(`/portal/chat`)"
      - "traefik.http.routers.portal-ws.priority=30"
      - "traefik.http.services.portal-ws.loadbalancer.server.port=4010"
    networks:
      - portal-network
      - portal-db-network
    depends_on:
      dna-postgres:
        condition: service_healthy
      dna-redis:
        condition: service_healthy
      portal-clamav:
        condition: service_started
    restart: unless-stopped

  # ============================================================
  # Customer Portal — Frontend
  # ============================================================
  portal-frontend:
    build:
      context: ./customer-portal/frontend
      dockerfile: Dockerfile
    container_name: portal-frontend
    expose:
      - "4000"
    volumes:
      - ./customer-portal/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORTAL_API_URL=http://portal-backend:4010
      - NEXT_PUBLIC_PORTAL_WS_URL=${NEXT_PUBLIC_PORTAL_WS_URL:-ws://localhost:${PORT_PORTAL_BACKEND:-4010}}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=portal-network"
      - "traefik.http.routers.portal-frontend.rule=Host(`${CF_PORTAL_HOSTNAME:-portal.example.com}`)"
      - "traefik.http.routers.portal-frontend.priority=1"
      - "traefik.http.services.portal-frontend.loadbalancer.server.port=4000"
    networks:
      - portal-network
    depends_on:
      - portal-backend
    restart: unless-stopped


  # ============================================================
  # Reverse Proxy (internal router)
  # ============================================================
  traefik:
    image: traefik:latest
    container_name: dna-traefik
    ports:
      - "80:80"        # CF Tunnel connects here; not exposed directly to internet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
    networks:
      - dna-network
      - portal-network
      - portal-db-network
    labels:
      - "traefik.enable=false"   # Do not route traffic to Traefik itself
    restart: unless-stopped

  # ============================================================
  # Cloudflare Tunnel (replaces all open inbound ports)
  # ============================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dna-cloudflared
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - dna-network     # Must reach traefik
      - portal-network  # Must reach traefik on portal network too
    depends_on:
      - traefik
    restart: unless-stopped

# ============================================================
# Networks
# ============================================================
networks:
  dna-network:
    driver: bridge
    name: dna-network
  portal-network:
    driver: bridge
    name: portal-network
  portal-db-network:
    driver: bridge
    name: portal-db-network

# ============================================================
# Volumes
# ============================================================
volumes:
  dna-postgres-data:
    driver: local
  dna-redis-data:
    driver: local
  backend-pip-cache:
    driver: local
  clamav-db:
    driver: local
  portal-tmp:
    driver: local
  portal-storage:
    driver: local
